<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Rhythm Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>

    <!-- ===== SELECTION SCREEN ===== -->
    <div id="selection-screen">
        <div class="cabinet-corner tl"></div>
        <div class="cabinet-corner tr"></div>
        <div class="cabinet-corner bl"></div>
        <div class="cabinet-corner br"></div>
        <div id="selection-demo"></div>

        <div class="selection-content">
            <div class="arcade-marquee">
                <div class="marquee-bar"></div>
                <h1>★ RHYTHM GAME ★</h1>
                <div class="marquee-bar"></div>
                <p class="hi-score-line">HI-SCORE &nbsp;<span id="high-score-selection">0</span></p>
            </div>

            <div class="arcade-panel">
                <label class="arcade-label">► SELECT TRACK</label>
                <div class="select-wrap">
                    <select id="song-selection" class="arcade-select">
                        <option value="audio/song1.mp3">SONG 1</option>
                        <option value="audio/song2.mp3">SONG 2</option>
                        <option value="audio/song3.mp3">SONG 3</option>
                    </select>
                </div>

                <label class="arcade-label">► DIFFICULTY</label>
                <div class="select-wrap">
                    <select id="difficulty-selection" class="arcade-select">
                        <option value="easy">EASY      ★ ☆ ☆</option>
                        <option value="medium">MEDIUM    ★ ★ ☆</option>
                        <option value="hard">HARD      ★ ★ ★</option>
                    </select>
                </div>
            </div>

            <div class="controls-preview">
                <p class="controls-label">═══ CONTROLS ═══</p>
                <div class="control-keys">
                    <div class="ckey ckey-cyan">←</div>
                    <div class="ckey ckey-yellow">↓</div>
                    <div class="ckey ckey-magenta">→</div>
                    <div class="ckey ckey-green">↑</div>
                </div>
            </div>

            <button onclick="startGame()" class="start-btn">▶ PRESS START ◀</button>
        </div>
    </div>

    <!-- ===== GAME SCREEN ===== -->
    <div id="game-screen" style="display:none">

        <div id="stats-bar">
            <div id="health-wrap">
                <span class="stat-label">HP</span>
                <div id="health-bar"><div id="health-bar-fill"></div></div>
            </div>
            <div id="combo"></div>
            <div class="score-wrap">
                <span class="stat-label">SCR</span>
                <span id="score">0</span>
            </div>
        </div>

        <div id="song-progress"><div id="song-progress-fill"></div></div>

        <div id="game-container">
            <div id="countdown-overlay"><div id="countdown-display"></div></div>
            <div id="pause-overlay">
                <div class="pause-title">PAUSED</div>
                <div class="pause-hint">ESC TO RESUME</div>
            </div>
            <div id="message"></div>

            <div id="lane-1" class="lane lane-cyan">
                <div class="hit-area"><span class="key-label">←</span></div>
                <div class="touch-zone" data-lane="lane-1"></div>
            </div>
            <div id="lane-2" class="lane lane-yellow">
                <div class="hit-area"><span class="key-label">↓</span></div>
                <div class="touch-zone" data-lane="lane-2"></div>
            </div>
            <div id="lane-3" class="lane lane-magenta">
                <div class="hit-area"><span class="key-label">→</span></div>
                <div class="touch-zone" data-lane="lane-3"></div>
            </div>
            <div id="lane-4" class="lane lane-green">
                <div class="hit-area"><span class="key-label">↑</span></div>
                <div class="touch-zone" data-lane="lane-4"></div>
            </div>
        </div>

        <div id="bottom-bar">
            <span>BEST: <span id="high-score-display">0</span></span>
            <span class="esc-hint">ESC = PAUSE</span>
            <button onclick="restartGame()" class="restart-btn">↺ RETRY</button>
        </div>

        <audio id="bg-music"></audio>
    </div>

    <script src="MusicRhythm.js"></script>
</body>
</html>
